<div class="pi-page">
  <div class="pi-card">

    <div class="pi-card__header">
      <div class="pi-card__header-glow"></div>
      <span class="pi-card__header-icon">🖼️</span>
      <div>
        <h3 class="pi-card__title">Imágenes de presentación</h3>
        <p class="pi-card__subtitle">Sube imágenes desde tu dispositivo · 4 login · 4 registro</p>
      </div>
    </div>

    <div class="pi-card__body" *ngIf="!cargando; else loader">

      <!-- ── Template reutilizable por grupo ────────────────────── -->
      <ng-template #tarjetas let-lista="lista">
        <div class="pi-grid">
          <div class="pi-item" *ngFor="let img of lista" [class.pi-item--changed]="tienePendiente(img)">

            <!-- Preview + zona de carga -->
            <div class="pi-item__preview"
                 (click)="fileRef.click()"
                 title="Haz clic para cambiar la imagen">
              <img *ngIf="tieneImagen(img)"
                   [src]="imagenSrc(img)"
                   [alt]="img.descripcion || 'Imagen ' + img.orden"
                   (error)="$any($event.target).style.display='none'" />
              <div *ngIf="!tieneImagen(img)" class="pi-item__placeholder">
                <span>📷</span>
                <small>Sin imagen</small>
              </div>

              <!-- Badge de orden -->
              <span class="pi-item__orden">#{{ img.orden }}</span>

              <!-- Indicador de cambio pendiente -->
              <span *ngIf="tienePendiente(img)" class="pi-item__badge-changed">
                ✏️ Nuevo
              </span>

              <!-- Hover overlay -->
              <div class="pi-item__hover-overlay">
                <span>📁 Cambiar imagen</span>
              </div>

              <input #fileRef type="file" accept="image/*" hidden
                     (change)="seleccionarArchivo(img, $event)">
            </div>

            <!-- Campos de metadatos -->
            <div class="pi-item__fields">

              <!-- Nombre del archivo pendiente -->
              <div *ngIf="tienePendiente(img)" class="pi-item__filename">
                <span>📄 {{ pendientes.get(img.id)!.nombre }}</span>
                <button class="pi-item__quitar" type="button"
                        (click)="quitarPendiente(img)" title="Quitar selección">✕</button>
              </div>

              <input class="pi-input" [(ngModel)]="img.descripcion"
                     placeholder="Descripción (promo, colección…)">

              <div class="pi-item__footer">
                <label class="pi-switch">
                  <input type="checkbox" [(ngModel)]="img.activo">
                  <span class="pi-switch__track"></span>
                  <span class="pi-switch__label">{{ img.activo ? 'Activo' : 'Inactivo' }}</span>
                </label>

                <button class="pi-btn-save"
                        [disabled]="guardandoId === img.id"
                        (click)="guardar(img)">
                  <span *ngIf="guardandoId !== img.id">
                    {{ tienePendiente(img) ? '🚀 Subir' : '💾 Guardar' }}
                  </span>
                  <span *ngIf="guardandoId === img.id"
                        class="d-flex align-items-center gap-1 justify-content-center">
                    <span class="spinner-border spinner-border-sm"></span>
                  </span>
                </button>
              </div>

            </div>
          </div>
        </div>
      </ng-template>

      <!-- ── Login ─────────────────────────────────────────────── -->
      <p class="pi-group-title">🔑 Login ({{ login.length }} imágenes)</p>
      <ng-container *ngTemplateOutlet="tarjetas; context: { lista: login }"></ng-container>

      <hr class="pi-divider">

      <!-- ── Registro ──────────────────────────────────────────── -->
      <p class="pi-group-title">📝 Registro ({{ registro.length }} imágenes)</p>
      <ng-container *ngTemplateOutlet="tarjetas; context: { lista: registro }"></ng-container>

    </div>

    <ng-template #loader>
      <div class="pi-loader"><span class="spinner-border text-primary"></span></div>
    </ng-template>

  </div>
</div>
