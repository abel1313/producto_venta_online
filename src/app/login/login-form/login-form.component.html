<div class="split-page">

  <!-- ── Panel izquierdo: imágenes ── -->
  <div class="split-images">
    <div class="img-slot img-slot--1">
      <img [src]="imgSrc(1)" alt="imagen 1" class="img-slot__icon">
      <div class="img-slot__overlay">
        <i class="pi pi-shopping-bag"></i>
        <span>{{ imgDesc(1) || 'Nueva colección' }}</span>
      </div>
    </div>

    <div class="img-slot-row">
      <div class="img-slot img-slot--2">
        <img [src]="imgSrc(2)" alt="imagen 2" class="img-slot__icon">
        <div class="img-slot__overlay">
          <i class="pi pi-tag"></i>
          <span>{{ imgDesc(2) }}</span>
        </div>
      </div>
      <div class="img-slot img-slot--3">
        <img [src]="imgSrc(3)" alt="imagen 3" class="img-slot__icon">
        <div class="img-slot__overlay">
          <i class="pi pi-heart"></i>
          <span>{{ imgDesc(3) }}</span>
        </div>
      </div>
    </div>

    <div class="split-images__brand">
      <span>Bolsas Key</span>
      <span class="split-images__tagline">Tu tienda de moda y accesorios</span>
    </div>
  </div>

  <!-- ── Panel derecho: formulario ── -->
  <div class="split-form">
    <div class="form-inner">

      <div class="brand">
        <div class="brand-icon">
          <i class="pi pi-shopping-bag"></i>
        </div>
        <h1 class="brand-name">Bolsas <span>Key</span></h1>
        <p class="brand-sub">Inicia sesión para continuar</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onLogin()" novalidate>

        <div class="field-wrap">
          <label class="field-label" for="username">Usuario</label>
          <div class="input-wrap">
            <i class="pi pi-user input-icon"></i>
            <input id="username" class="field-input" formControlName="userName"
                   type="text" placeholder="Ingresa tu usuario" autocomplete="username">
          </div>
        </div>

        <div class="field-wrap">
          <label class="field-label" for="password">Contraseña</label>
          <div class="input-wrap">
            <i class="pi pi-lock input-icon"></i>
            <input id="password" class="field-input" formControlName="password"
                   [type]="mostrarPassword ? 'text' : 'password'"
                   placeholder="Ingresa tu contraseña" autocomplete="current-password">
            <button type="button" class="toggle-pass" (click)="mostrarPassword = !mostrarPassword" tabindex="-1">
              <i class="pi" [ngClass]="mostrarPassword ? 'pi-eye-slash' : 'pi-eye'"></i>
            </button>
          </div>
        </div>

        <div class="error-msg" *ngIf="errorMessage">
          <i class="pi pi-exclamation-circle"></i>
          {{ errorMessage }}
        </div>

        <button type="submit" class="btn-login" [disabled]="loginForm.invalid">
          <span>Entrar</span>
          <i class="pi pi-arrow-right"></i>
        </button>

        <p class="register-link">
          ¿No tienes cuenta?
          <a [routerLink]="['/usuarios/registrar']">Regístrate aquí</a>
        </p>

      </form>
    </div>
  </div>

</div>
