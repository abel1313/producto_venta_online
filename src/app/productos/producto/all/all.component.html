<div class="row p-2">
  <div class="col-12 col-md-6">
    <div class="input-group mb-3">
      <input type="text" class="form-control" placeholder="Buscar producto o código de barras"
        aria-label="buscar" [(ngModel)]="buscarProd" (keyup)="buscarProductos($event)">
      <button class="btn btn-outline-secondary" type="button" (click)="iniciarEscaner()" title="Escanear código de barras">
        📷
      </button>
    </div>
  </div>
</div>

<!-- Escáner de cámara -->
<div class="scanner-overlay" *ngIf="escaneando">
  <div class="scanner-box">
    <video #videoScanner class="scanner-video" autoplay playsinline></video>
    <div class="scanner-linea"></div>
    <button class="btn btn-danger mt-2 w-100" (click)="detenerEscaner()">✖ Cerrar escáner</button>
  </div>
</div>

<div class="container ">
  
  <div class="scroll-container" (scroll)="onScroll($event)">
    <div class="row">
      <div class="col-md-4 mt-2" *ngFor="let item of rows">
        <mat-card class="example-card " appearance="outlined">
          <mat-card-header>
            <div mat-card-avatar class="example-header-image"></div>
            <mat-card-title>Nombre del producto <p><b>{{item.nombre}}</b></p>
            </mat-card-title>
            <mat-card-subtitle>Código de barra <b>{{item.codigoBarras}}</b> </mat-card-subtitle>
            <mat-card-subtitle>Precio de <b>{{item.nombre}} {{item.precioVenta | currency}}</b> </mat-card-subtitle>
          </mat-card-header>
          <img style="height: 80%;" class="mx-auto img-producto" mat-card-image
            [src]="'data:'+item.imagen.contentType + '/;base64,' + item.imagen.imagen " [alt]="item?.listImgs?.[0]?.nombreImagen ?? 'Imagen sin nombre'"
            (click)="irDetalleProducto(item.idProducto)">
          <mat-card-content>
            <p>
              {{item.descripcion}}
            </p>
          </mat-card-content>
          <div class="col-12" style="margin-bottom: 8px;">
            <button
              type="button"
              class="btn col-12"
              [class.btn-secondary]="!stockAgotadoEnCarrito(item)"
              [class.btn-danger]="stockAgotadoEnCarrito(item)"
              [disabled]="stockAgotadoEnCarrito(item)"
              (click)="addCarrito(item)"
            >
              <b *ngIf="!stockAgotadoEnCarrito(item)">
                Agregar al carrito
                <span *ngIf="cantidadEnCarrito(item) > 0">({{ cantidadEnCarrito(item) }}/{{ item.stock }})</span>
                <img [src]="iconImagen.iconCarrito" style="width: 20px; height: 20px; margin-left: 8px;" />
              </b>
              <b *ngIf="stockAgotadoEnCarrito(item)">
                Stock agotado ({{ item.stock }}/{{ item.stock }})
              </b>
            </button>
          </div>
          <div class="col-12" style="margin-bottom: 8px;" type="button" *ngIf="!isAnonymous" >
            <button type="button" class="btn btn-secondary col-12"  (click)="removeCarrito(item)"  [disabled]="!isProductoEnCarrito(item)">
             <b> Eliminar del carrito  <img [src]="iconImagen.iconEliminar" style="width: 20px; height: 20px; margin-left: 8px;" /></b>
            </button>
          </div>
          <div class="col-6"  type="button" class="btn btn-secondary" *ngIf="isAdminUser" (click)="updateProducto(item)">actualizar producto
            <img [src]="iconImagen.iconEditar" style="width: 20px; height: 20px; margin-left: 8px;" />
          </div>

        </mat-card>

      </div>
    </div>
  </div>

</div>




<ng-container *ngIf="rows == null">
  <ag-grid-angular [rowData]="rows" [columnDefs]="columns" [pagination]="false" class="ag-theme-alpine"
    [style]="{ width: styleTableWidth, height: styleTableheight }" (contextmenu)="blockContextMenu($event)"
    (cellContextMenu)="abrirMenu($event)">
  </ag-grid-angular>

  <button class="btn btn-success" [disabled]="paginacion?.pagina == 1 || !paginacion " (click)="primeraPagina()">⬅️
    Primera</button>
  <button class="btn btn-success" [disabled]="paginacion?.pagina == 1 || !paginacion " (click)="paginaAnterior()">◀️
    Anterior</button>

  <b class="no-select no-highlight" *ngIf="paginacion && paginacion.totalPaginas > 0  ">
    Página<b *ngIf="paginacion && paginacion.pagina > 1">s</b> {{paginacion.pagina}} de {{paginacion.totalPaginas}}
  </b>

  <button class="btn btn-success" [disabled]="paginacion?.pagina == paginacion?.totalPaginas"
    (click)="siguientePagina()">▶️ Siguiente</button>
  <button class="btn btn-success" [disabled]="paginacion?.pagina == paginacion?.totalPaginas"
    (click)="ultimaPagina()">➡️ Última</button>

  <!-- Botón INVISIBLE para activar el menú -->
  <button #menuTrigger mat-button [matMenuTriggerFor]="menu" style="display: block;"></button>




  <mat-menu #menu="matMenu">
    <button *ngIf="itemAgregar" mat-menu-item (click)="agregarFila()">{{itemAgregar}}</button>
    <button *ngIf="itemEliminar" mat-menu-item (click)="eliminarFila()">{{itemEliminar}}</button>
  </mat-menu>
</ng-container>
