<!-- Botón regresar -->
<button class="up-back" (click)="volver()">
  <i class="pi pi-arrow-left"></i> Mis productos
</button>

<!-- Formulario de actualización -->
<app-add [nombreCard]="'Actualizar Producto'" [productoUpdate]="productoActualizar"></app-add>

<!-- ── Carrusel de imágenes ─────────────────────────────────────────── -->
<div class="ui-imgs">

  <div class="ui-imgs__header">
    <span class="ui-imgs__title">🖼️ Imágenes del producto</span>
    <span class="ui-imgs__count" *ngIf="displayImages.length > 0">
      {{ displayImages.length }} cargadas
    </span>
  </div>

  <!-- Spinner primera carga -->
  <div *ngIf="cargandoImagenes" class="ui-imgs__loading">
    <span class="spinner-border spinner-border-sm text-primary"></span>
    <span>Cargando imágenes…</span>
  </div>

  <!-- Sin imágenes -->
  <div *ngIf="!cargandoImagenes && displayImages.length === 0" class="ui-imgs__empty">
    <span>📷</span>
    <p>Este producto no tiene imágenes cargadas</p>
  </div>

  <!-- Carrusel -->
  <p-carousel
    *ngIf="displayImages.length > 0"
    [value]="displayImages"
    [numVisible]="4"
    [numScroll]="1"
    [circular]="false"
    [responsiveOptions]="responsiveOptions"
    (onPage)="handlePageChange($event)"
    styleClass="ui-carousel">

    <ng-template pTemplate="item" let-item>
      <div class="ui-slide">

        <div class="ui-slide__wrap" [class.ui-slide__wrap--principal]="item.dto.principal">

          <!-- Cargando blob -->
          <div *ngIf="item.cargando" class="ui-slide__skeleton">
            <span class="spinner-border spinner-border-sm"></span>
          </div>

          <!-- Imagen -->
          <img *ngIf="!item.cargando && item.src"
               [src]="item.src"
               [alt]="item.dto.nombreImagen"
               class="ui-slide__img" />

          <!-- Badge principal -->
          <span *ngIf="item.dto.principal" class="ui-slide__badge">⭐ Principal</span>

          <!-- Botón set principal -->
          <button class="ui-slide__star"
                  type="button"
                  [class.ui-slide__star--active]="item.dto.principal"
                  [disabled]="item.dto.principal"
                  (click)="setPrincipal(item)"
                  title="{{ item.dto.principal ? 'Imagen principal' : 'Marcar como principal' }}">
            {{ item.dto.principal ? '⭐' : '☆' }}
          </button>

          <!-- Botón eliminar -->
          <button class="ui-slide__del"
                  type="button"
                  [disabled]="estaEliminando(item.dto.id)"
                  (click)="eliminarImagen(item)"
                  title="Eliminar imagen">
            <span *ngIf="!estaEliminando(item.dto.id)">✕</span>
            <span *ngIf="estaEliminando(item.dto.id)" class="spinner-border spinner-border-sm"></span>
          </button>

        </div>

        <p class="ui-slide__name" [title]="item.dto.nombreImagen">
          {{ item.dto.nombreImagen }}
        </p>

      </div>
    </ng-template>

  </p-carousel>

</div>
