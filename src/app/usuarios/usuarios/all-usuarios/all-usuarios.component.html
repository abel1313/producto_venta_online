<app-buscar-usuarios (regresarProductos)="usuariosResponse($event)"></app-buscar-usuarios>

<div class="au-wrapper">
  <div class="au-scroll" (scroll)="onScroll($event)">
    <div class="au-grid">

      <div class="au-card" *ngFor="let item of rows">

        <div class="au-card__avatar" [style.background]="avatarColor(item.username)">
          {{ initials(item.username) }}
        </div>

        <div class="au-card__body">
          <span class="au-card__name">{{ item.username }}</span>
          <span class="au-card__email">
            <i class="pi pi-envelope"></i>
            {{ item.email || 'Sin correo' }}
          </span>
          <span class="au-card__rol">{{ item.rol }}</span>
        </div>

        <div class="au-card__actions">
          <button class="au-btn au-btn--edit" (click)="updateUsuario(item)">
            <img [src]="iconImagen.iconEditar" class="au-btn__icon" alt="" />
            Actualizar
          </button>
          <button class="au-btn au-btn--delete" (click)="removeUsuario(item)">
            <img [src]="iconImagen.iconEliminar" class="au-btn__icon" alt="" />
            Eliminar
          </button>
        </div>

      </div>

    </div>
  </div>
</div>
