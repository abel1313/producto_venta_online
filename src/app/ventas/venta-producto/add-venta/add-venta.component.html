<div class="venta-layout">

  <!-- ===== TABLA 1: BUSCADOR DE PRODUCTOS ===== -->
  <div class="venta-card">
    <div class="venta-card__header">
      <span class="venta-card__title">Productos</span>
      <div class="venta-card__actions">
        <div class="input-group input-group-sm buscador-input">
          <span class="input-group-text">🔍</span>
          <input
            type="text"
            class="form-control"
            placeholder="Buscar por nombre o código..."
            (keyup)="buscarProductos($event)">
        </div>
      </div>
    </div>

    <ag-grid-angular
      [rowData]="rowsBuscador"
      [columnDefs]="columnsBuscador"
      [pagination]="true"
      [paginationPageSize]="10"
      [suppressPaginationPanel]="false"
      class="ag-theme-alpine venta-grid"
      (contextmenu)="blockContextMenuBuscador($event)"
      (cellContextMenu)="abrirMenuBuscador($event)">
    </ag-grid-angular>
  </div>

  <!-- ===== TABLA 2: DETALLE DE VENTA ===== -->
  <div class="venta-card mt-3">
    <div class="venta-card__header">
      <span class="venta-card__title">Detalle de venta</span>
      <div class="venta-card__actions">
        <span class="total-badge">{{ totalDetalle }}</span>
        <button
          class="btn btn-sm btn-success"
          [disabled]="!disableBoton"
          (click)="saveDetalle()">
          💾 Guardar venta
        </button>
      </div>
    </div>

    <ag-grid-angular
      [rowData]="rowsDetalle"
      [columnDefs]="columnsDetalle"
      [pagination]="false"
      class="ag-theme-alpine venta-grid venta-grid--detalle"
      (contextmenu)="blockContextMenuDetalle($event)"
      (cellContextMenu)="abrirMenuDetalle($event)">
    </ag-grid-angular>
  </div>

</div>

<!-- ===== MENÚ CONTEXTUAL TABLA 1 ===== -->
<div class="ctx-menu"
  *ngIf="menuBuscadorVisible"
  [style.left]="menuBuscadorX"
  [style.top]="menuBuscadorY"
  (click)="$event.stopPropagation()">
  <button class="ctx-menu__item" (click)="agregarFilaBuscador()">
    ➕ Agregar al detalle
  </button>
</div>

<!-- ===== MENÚ CONTEXTUAL TABLA 2 ===== -->
<div class="ctx-menu"
  *ngIf="menuDetalleVisible"
  [style.left]="menuDetalleX"
  [style.top]="menuDetalleY"
  (click)="$event.stopPropagation()">
  <button class="ctx-menu__item ctx-menu__item--danger" (click)="eliminarFilaDetalle()">
    🗑 Eliminar del detalle
  </button>
</div>
