<div class="venta-layout">

  <!-- ===== TABLA 1: BUSCADOR DE PRODUCTOS ===== -->
  <div class="venta-card">
    <div class="venta-card__header">
      <span class="venta-card__title">Productos</span>
      <div class="venta-card__actions">
        <div class="input-group input-group-sm buscador-input">
          <span class="input-group-text">🔍</span>
          <input
            type="text"
            class="form-control"
            placeholder="Buscar por nombre o código..."
            (keyup)="buscarProductos($event)">
        </div>
      </div>
    </div>

    <ag-grid-angular
      [rowData]="rowsBuscador"
      [columnDefs]="columnsBuscador"
      [pagination]="true"
      [paginationPageSize]="10"
      [suppressPaginationPanel]="false"
      class="ag-theme-alpine venta-grid"
      (contextmenu)="blockContextMenuBuscador($event)"
      (cellContextMenu)="abrirMenuBuscador($event)">
    </ag-grid-angular>
  </div>

  <!-- ===== TABLA 2: DETALLE DE VENTA ===== -->
  <div class="venta-card mt-3">
    <div class="venta-card__header">
      <span class="venta-card__title">Detalle de venta</span>
      <div class="venta-card__actions">
        <span class="total-badge">{{ totalDetalle }}</span>
        <button
          class="btn btn-sm btn-success"
          [disabled]="!disableBoton"
          (click)="abrirDialogoPago()">
          💾 Guardar venta
        </button>
      </div>
    </div>

    <ag-grid-angular
      [rowData]="rowsDetalle"
      [columnDefs]="columnsDetalle"
      [pagination]="false"
      class="ag-theme-alpine venta-grid venta-grid--detalle"
      (contextmenu)="blockContextMenuDetalle($event)"
      (cellContextMenu)="abrirMenuDetalle($event)">
    </ag-grid-angular>
  </div>

</div>

<!-- ===== MODAL DE PAGO ===== -->
<p-dialog
  header="Forma de pago"
  [(visible)]="mostrarDialogoPago"
  [modal]="true"
  [style]="{ width: '480px' }"
  [closable]="true"
  [contentStyle]="{ overflow: 'visible', padding: '1.5rem' }"
  (onHide)="cancelarDialogoPago()">

  <div class="p-fluid">

    <div class="field mb-3">
      <label class="fw-bold">Total a cobrar: {{ totalDetalle }}</label>
    </div>

    <!-- Combo 1: Forma de pago -->
    <div class="field mb-3">
      <label for="tipoPagoVenta">Forma de pago</label>
      <p-dropdown
        id="tipoPagoVenta"
        [options]="opcionesEstructuradas"
        [(ngModel)]="tipoPagoActivo"
        optionLabel="formaPago"
        placeholder="Seleccione una forma de pago"
        (onChange)="seleccionarTipoPago(tipoPagoActivo!)"
        appendTo="body"
        [style]="{ width: '100%' }">
      </p-dropdown>
    </div>

    <!-- Combo 2: Plan de meses (solo si aplica) -->
    <div class="field mb-3" *ngIf="tipoPagoActivo?.mostrarMeses">
      <label for="mesesVenta">Plan de pago</label>
      <p-dropdown
        id="mesesVenta"
        [options]="tipoPagoActivo!.opciones"
        [(ngModel)]="mesesSeleccionado"
        optionLabel="descripcion"
        placeholder="Seleccione un plan"
        (onChange)="seleccionarMeses(mesesSeleccionado!)"
        appendTo="body"
        [style]="{ width: '100%' }">
      </p-dropdown>
    </div>

  </div>

  <ng-template pTemplate="footer">
    <div class="d-flex justify-content-end gap-2">
      <button class="btn btn-secondary" (click)="cancelarDialogoPago()">Cancelar</button>
      <button class="btn btn-success" [disabled]="!puedeConfirmar" (click)="confirmarPago()">
        ✅ Confirmar venta
      </button>
    </div>
  </ng-template>

</p-dialog>

<!-- ===== MENÚ CONTEXTUAL TABLA 1 ===== -->
<div class="ctx-menu"
  *ngIf="menuBuscadorVisible"
  [style.left]="menuBuscadorX"
  [style.top]="menuBuscadorY"
  (click)="$event.stopPropagation()">
  <button class="ctx-menu__item" (click)="agregarFilaBuscador()">
    ➕ Agregar al detalle
  </button>
  <button class="ctx-menu__item" (click)="verImagenProducto()">
    🖼 Ver imagen
  </button>
</div>

<!-- ===== VISOR DE IMAGEN ===== -->
<div class="img-visor-overlay" *ngIf="mostrarVisorImagen" (click)="cerrarVisor()">
  <div class="img-visor-box" (click)="$event.stopPropagation()">
    <button class="img-visor-close" (click)="cerrarVisor()">✕</button>
    <img class="img-visor-img"
      [src]="imagenVisor"
      [alt]="filaSeleccionadaBuscador?.nombre ?? 'Imagen'"
      (error)="$any($event.target).src = 'assets/img/no-image.png'" />
    <p class="img-visor-nombre">{{ filaSeleccionadaBuscador?.nombre }}</p>
  </div>
</div>

<!-- ===== MENÚ CONTEXTUAL TABLA 2 ===== -->
<div class="ctx-menu"
  *ngIf="menuDetalleVisible"
  [style.left]="menuDetalleX"
  [style.top]="menuDetalleY"
  (click)="$event.stopPropagation()">
  <button class="ctx-menu__item" (click)="verImagenDetalle()">
    🖼 Ver imagen
  </button>
  <button class="ctx-menu__item ctx-menu__item--danger" (click)="eliminarFilaDetalle()">
    🗑 Eliminar del detalle
  </button>
</div>
